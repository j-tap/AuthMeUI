# Localization settings
localization:
  # Default language used when player language is unavailable
  default-language: "en"
  # Auto-detect player language from Minecraft client locale
  auto-detect-player-locale: true
  # Legacy migration mode:
  # - Copies old text keys from this config into translations/en.yml
  # - Creates plugins/AuthMeUI/config.backup-before-legacy-prune.yml
  # - Removes migrated text keys from this file when true
  prune-legacy-config: false

# General dialog settings
dialogs:
  # Allow players to close dialogs by pressing escape
  allow-escape-close: false
  # Number of button columns in dialogs
  button-columns: 2
  # Default input field width
  input-width: 150
  # Show authentication dialogs during configuration phase (before player joins)
  # When enabled, players must authenticate before fully joining the server
  # When disabled, dialogs are shown after the player joins (default behavior)
  use-configuration-phase: false
  # Delay in ticks before opening post-join login/register dialog
  # Helps AuthMe finalize player's authentication state after join
  post-join-open-delay-ticks: 15
  # Polling interval in ticks for post-join auth-state rechecks
  post-join-open-recheck-interval-ticks: 10
  # Maximum number of post-join polling attempts before task cancellation
  post-join-open-max-rechecks: 10
  # Timeout in seconds for configuration phase authentication (default: 60)
  # After this time, the player will be disconnected if not authenticated
  configuration-phase-timeout: 60

# Dialog text lives in plugins/AuthMeUI/translations/<language>.yml

# Login dialog action buttons (optional)
login-dialog:
  # actions:
  #   - type: submit
  #     label: "<green>Login</green>"
  #   - type: command
  #     label: "<yellow>Help</yellow>"
  #     template: "/help login"

# Registration dialog action buttons (optional)
register-dialog:
  # actions: []

# Rules dialog behavior (text is in translation files)
rules-dialog:
  enabled: true
  agreement:
    enabled: true
    checkbox-key: "rules_accepted"

# Analytics settings (bStats)
metrics:
  enabled: true
